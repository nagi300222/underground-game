name: Apply audited v0.4.3d release

on:
  push:
    branches:
      - release/v0.4.3d-tutorial-conversation-info
    paths:
      - .github/workflows/apply-v043d-once.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v0.4.3d-tutorial-conversation-info
          fetch-depth: 0
      - name: Apply audited candidate
        shell: bash
        run: |
          set -euo pipefail
          echo '' | base64 -d | gzip -d > /tmp/v043d_release.patch
          git apply --check /tmp/v043d_release.patch
          git apply /tmp/v043d_release.patch
          node --check game.js
          cat > /tmp/expected.sha256 <<'EOF'
          5ec047115a3284bfda6199e5c4835b9f1c83d7e1109368b88612170df68e9ad0  README.md
          ed8f881fab88fe5d8228880ccbb036ceed97ac74ea7cd7d10d2be68a9b7c0ed2  VERSION.txt
          8cc2d2e2ad8a28b7e165cf830f8d3f4ee96c672b309a90017f58e586067aeed9  game.js
          0e997b549edf8f8900acc3d3bf93e1445f46d51c9834d07b6904463bf53224b6  index.html
          a4722899217491a668c1e60ebff8a3753bfb2b4678351644aba1e2a0e58b4cde  style.css
          78101aed79d2e39fc737664c2be061defe488077974286d11b4b1c065ee4e8a7  sw.js
          EOF
          sha256sum -c /tmp/expected.sha256
      - name: Commit six release files only
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-v043d-once.yml
          git add README.md VERSION.txt game.js index.html style.css sw.js
          git commit -m "Implement v0.4.3d tutorial conversation info"
          git push origin HEAD:release/v0.4.3d-tutorial-conversation-info
