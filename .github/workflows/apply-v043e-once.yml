name: Apply audited v0.4.3e patch

on:
  push:
    branches:
      - release/v0.4.3e-visual-rc
    paths:
      - .github/workflows/apply-v043e-once.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/apply-v043e-once.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v0.4.3e-visual-rc
          fetch-depth: 0
      - name: Apply audited candidate patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/v043e-patch/part-*.patch > /tmp/v043e.patch
          git apply --check /tmp/v043e.patch
          git apply /tmp/v043e.patch
          node --check game.js
          cat > /tmp/expected.sha256 <<'EOF'
          0c0357092d48ae96aee46a024276e86da04fa7a67030a99331c1586549dea31c  README.md
          86590b726e78ca027bb46551a9517dd12606f1c4e558d2540e11a78b8374f79e  VERSION.txt
          d6018c117884e66cd38f249836623a7368c981aad832986c4d4fdecd76dabb74  game.js
          cc5026ef96e20fb9838a826966f757cb3b8b42af89c0dd458a2ea76719c19134  index.html
          17bf9367d0202014e3744f27f19041a2313c289cc7e841633e58478e74ed072c  style.css
          0240c395475c5d55b446d6226625431e3d8cdbe479934a470137caaafaf31fb7  sw.js
          EOF
          sha256sum -c /tmp/expected.sha256
      - name: Commit release files only
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -r .github/v043e-patch .github/workflows/apply-v043e-once.yml
          git add README.md VERSION.txt game.js index.html style.css sw.js
          git commit -m "Implement v0.4.3e visual RC"
          git push origin HEAD:release/v0.4.3e-visual-rc
